<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagi Events — прототип</title>
<style>
  :root{
    --bg:#0f1420; --card:#161c2b; --card2:#1e2636; --line:#2a3346;
    --txt:#eef2f8; --mut:#94a0b4; --accent:#4f7cf0; --accent2:#14b8a6;
    --ok:#36d399; --warn:#ffcf5c; --radius:18px; color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#16243f 0,transparent 60%),
    radial-gradient(900px 500px at -10% 20%,#123a37 0,transparent 55%),var(--bg);
    color:var(--txt);min-height:100vh;display:flex;justify-content:center;padding:24px 12px 90px}
  .shell{width:100%;max-width:430px}
  svg{display:block}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 14px}
  .brand{font-weight:800;font-size:22px;letter-spacing:.5px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand small{display:block;font-size:10px;font-weight:600;color:var(--mut);letter-spacing:2px;-webkit-text-fill-color:var(--mut)}
  .topicons{display:flex;gap:8px}
  .icobtn{position:relative;width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt)}
  .icobtn .dot{position:absolute;top:8px;right:9px;width:9px;height:9px;border-radius:50%;background:var(--accent2);border:2px solid var(--card)}
  .screen{display:none;animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .hero{position:relative;border-radius:24px;overflow:hidden;padding:22px;background:linear-gradient(135deg,#4f7cf0,#14b8a6);margin-bottom:16px}
  .hero h2{font-size:22px}
  .hero p{opacity:.92;font-size:13px;margin-top:4px}
  .avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.4)}
  .row{display:flex;gap:12px;align-items:center}
  .stat{flex:1;text-align:center}
  .stat b{font-size:18px;display:block}
  .stat span{font-size:11px;color:var(--mut)}
  h3{font-size:15px;margin:14px 2px 10px;display:flex;justify-content:space-between;align-items:center}
  h3 .link{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600}
  .ev{display:flex;gap:12px;align-items:center;padding:12px;border-radius:14px;background:var(--card2);margin-bottom:10px;cursor:pointer;border:1px solid transparent;transition:.15s}
  .ev:hover{border-color:var(--accent)}
  .ic{width:46px;height:46px;border-radius:12px;background:#243149;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent)}
  .ic.sm{width:34px;height:34px;border-radius:10px}
  .ev .meta{flex:1;min-width:0}
  .ev .meta b{font-size:14px}
  .ev .meta span{font-size:12px;color:var(--mut);display:block}
  .pill{font-size:11px;padding:4px 9px;border-radius:20px;background:#243149;color:#aecbf2;white-space:nowrap}
  .pill.soon{background:#3a3a20;color:#ecd58a}
  .cat{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#23314a;color:#9fc0ff;margin-top:3px}
  .btn{display:block;width:100%;text-align:center;padding:13px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;margin-top:6px}
  .btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .btn.danger{background:transparent;color:#ff8fa6;border:1px solid #5a3030}
  .btn.tiny{display:inline-block;width:auto;padding:8px 14px;font-size:12px;margin:0}
  .btn.ico{display:flex;align-items:center;justify-content:center;gap:8px}
  input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:14px;font-family:inherit;margin-bottom:10px}
  label{font-size:12px;color:var(--mut);margin:2px 2px 6px;display:block}
  .seg{display:flex;background:var(--card2);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
  .seg button{flex:1;border:none;background:transparent;color:var(--mut);padding:8px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  .wish{display:flex;gap:12px;padding:12px;border-radius:14px;background:var(--card2);margin-bottom:10px;align-items:center}
  .reserved{opacity:.55}
  .reserved .meta b{text-decoration:line-through}
  .progress{height:7px;border-radius:5px;background:#243149;overflow:hidden;margin-top:7px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .empty{text-align:center;padding:28px 18px;border:1.5px dashed var(--line);border-radius:18px;margin-bottom:14px}
  .empty .eic{color:var(--mut);margin:0 auto 10px;display:flex;justify-content:center}
  .empty b{font-size:15px;display:block;margin-bottom:6px}
  .empty p{font-size:12.5px;color:var(--mut);line-height:1.5;margin-bottom:14px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;background:rgba(15,20,32,.88);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:10}
  .tabbar .inner{width:100%;max-width:430px;display:flex}
  .tab{flex:1;text-align:center;padding:9px 0 12px;color:var(--mut);font-size:10px;cursor:pointer;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tab.on{color:var(--accent)}
  .fab{position:fixed;bottom:78px;left:50%;transform:translateX(calc(215px - 100%));width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(79,124,240,.45);z-index:9;display:flex;align-items:center;justify-content:center}
  .modal{position:fixed;inset:0;background:rgba(8,10,18,.7);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .modal.show{display:flex}
  .sheet{width:100%;max-width:430px;background:var(--card);border-radius:24px 24px 0 0;padding:20px;max-height:88vh;overflow:auto;animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px)}to{transform:none}}
  .sheet .grab{width:40px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 16px}
  .chip{display:inline-block;padding:7px 13px;border-radius:20px;background:var(--card2);border:1px solid var(--line);font-size:12px;margin:0 6px 8px 0;cursor:pointer}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e2942;border:1px solid var(--accent);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;opacity:0;pointer-events:none;transition:.3s;z-index:99;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .guest{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .guest:last-child{border-bottom:none}
  .gav{width:34px;height:34px;border-radius:50%;background:#243149;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent)}
  .tag{font-size:10px;padding:3px 8px;border-radius:8px;margin-left:auto}
  .tag.yes{background:#16412f;color:var(--ok)}
  .tag.no{background:#45222c;color:#ff9fb2}
  .tag.maybe{background:#453a1c;color:var(--warn)}
  .role{font-size:10px;padding:3px 8px;border-radius:8px;margin-left:auto;background:#23314a;color:#9fc0ff}
  .muted{color:var(--mut);font-size:12px;line-height:1.5}
  .note{font-size:11px;color:var(--mut);background:var(--card2);border-radius:10px;padding:9px 11px;margin-top:8px}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px}
  .calhead b{font-size:16px}.calhead span{cursor:pointer;color:var(--accent);font-size:20px;padding:0 8px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px}
  .caldow{text-align:center;font-size:10px;color:var(--mut);padding:4px 0;font-weight:600}
  .calday{aspect-ratio:1;border-radius:11px;background:var(--card2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;position:relative;border:1px solid transparent}
  .calday.empty{background:transparent}
  .calday.today{border-color:var(--accent);font-weight:700}
  .calday.has{cursor:pointer}
  .calday .mk{position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:var(--accent2)}
  .langseg{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
  .langseg button{border:1px solid var(--line);background:var(--card2);color:var(--mut);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}
  .langseg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .feat{display:flex;gap:12px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
  .feat .fic{color:var(--accent);flex-shrink:0}
  .feat b{font-size:14px}.feat span{font-size:12px;color:var(--mut);display:block}
  .dots{display:flex;gap:6px;justify-content:center;margin:18px 0}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dots i.on{background:var(--accent);width:20px;border-radius:4px}
  .onb{position:fixed;inset:0;z-index:200;display:none;background:
    radial-gradient(900px 500px at 80% 0,#16243f 0,transparent 60%),
    radial-gradient(700px 500px at 0 100%,#123a37 0,transparent 55%),var(--bg);
    overflow:auto;padding:30px 22px;justify-content:center}
  .onb.show{display:flex}
  .onb .inner{width:100%;max-width:400px;margin:auto;text-align:center}
  .ostep{display:none;animation:fade .3s ease}
  .ostep.active{display:block}
  .obrand{font-size:40px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
  .demobar{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:150;background:rgba(22,28,43,.92);border:1px solid var(--accent);border-radius:30px;padding:5px;display:flex;gap:4px;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .demobar button{border:none;background:transparent;color:var(--mut);padding:6px 12px;border-radius:24px;font-size:11px;font-weight:700;cursor:pointer}
  .demobar button.on{background:var(--accent);color:#fff}
</style>
</head>
<body>

<div class="demobar">
  <button id="dmNew" class="on" onclick="startOnboarding()" data-i18n="demo_new">Новый пользователь</button>
  <button id="dmActive" onclick="loadActive()" data-i18n="demo_active">Активный</button>
</div>

<!-- ОНБОРДИНГ -->
<div class="onb" id="onb"><div class="inner">
  <div class="ostep active" id="o1">
    <div class="langseg" id="obLang"></div>
    <div class="obrand">Sagi Events</div>
    <p class="muted" style="margin-bottom:24px" data-i18n="ob_welcome_sub"></p>
    <div class="feat"><span class="fic" id="of1"></span><div><b data-i18n="ob_f1_t"></b><span data-i18n="ob_f1_s"></span></div></div>
    <div class="feat"><span class="fic" id="of2"></span><div><b data-i18n="ob_f2_t"></b><span data-i18n="ob_f2_s"></span></div></div>
    <div class="feat"><span class="fic" id="of3"></span><div><b data-i18n="ob_f3_t"></b><span data-i18n="ob_f3_s"></span></div></div>
    <button class="btn" style="margin-top:18px" onclick="ostep(2)" data-i18n="ob_create_account"></button>
    <p class="muted" style="margin-top:12px"><span data-i18n="ob_minute"></span> <span data-i18n="ob_have"></span> <span style="color:var(--accent);cursor:pointer" onclick="ostep(2)" data-i18n="ob_login"></span></p>
  </div>
  <div class="ostep" id="o2">
    <div class="dots"><i class="on"></i><i></i><i></i></div>
    <h2 style="margin-bottom:4px" data-i18n="ob_profile_t"></h2>
    <p class="muted" style="margin-bottom:18px" data-i18n="ob_profile_s"></p>
    <label data-i18n="ob_name"></label><input id="obName" data-i18n-ph="ob_name_ph">
    <label data-i18n="ob_city"></label><input id="obCity" data-i18n-ph="ob_city_ph">
    <button class="btn" onclick="saveProfile()" data-i18n="ob_next"></button>
  </div>
  <div class="ostep" id="o3">
    <div class="dots"><i></i><i class="on"></i><i></i></div>
    <h2 style="margin-bottom:4px" data-i18n="ob_bday_t"></h2>
    <p class="muted" style="margin-bottom:18px" data-i18n="ob_bday_s"></p>
    <label data-i18n="ob_bday_date"></label><input type="date">
    <label><input type="checkbox" style="width:auto;margin-right:8px" checked> <span data-i18n="ob_hide_year"></span></label>
    <button class="btn" onclick="ostep(4)" data-i18n="ob_next"></button>
    <button class="btn sec" onclick="ostep(4)" data-i18n="ob_skip"></button>
  </div>
  <div class="ostep" id="o4">
    <div class="dots"><i></i><i></i><i class="on"></i></div>
    <h2 style="margin-bottom:4px" data-i18n="ob_friends_t"></h2>
    <p class="muted" style="margin-bottom:18px" data-i18n="ob_friends_s"></p>
    <div class="card" style="text-align:left">
      <div class="row" style="margin-bottom:10px"><span class="ic sm" id="ofr1"></span><div style="flex:1"><b style="font-size:13px" data-i18n="ob_contacts_t"></b><div class="muted" data-i18n="ob_contacts_s"></div></div><button class="btn tiny" onclick="toast(t('toast_contacts'))" data-i18n="ob_find"></button></div>
      <div class="row"><span class="ic sm" id="ofr2"></span><div style="flex:1"><b style="font-size:13px" data-i18n="ob_invite_t"></b><div class="muted">sagi.events/u/sagi</div></div><button class="btn tiny" onclick="toast(t('toast_link'))" data-i18n="ob_copy"></button></div>
    </div>
    <button class="btn" onclick="finishOnboarding()" data-i18n="ob_go"></button>
    <button class="btn sec" onclick="finishOnboarding()" data-i18n="ob_skip_now"></button>
  </div>
</div></div>

<div class="shell">
  <div class="topbar">
    <div class="brand">Sagi Events<small data-i18n="brand_sub"></small></div>
    <div class="topicons">
      <div class="icobtn" id="bell" onclick="go('notif')"></div>
      <div class="icobtn" id="gearBtn" onclick="open_('mAccount')"></div>
    </div>
  </div>

  <!-- ЛЕНТА -->
  <div id="feed" class="screen active">
    <div class="hero" id="feedHero"></div>
    <div class="seg" id="feedSeg" style="display:none">
      <button class="on" id="segList" onclick="feedView(this,'list')"></button>
      <button id="segCal" onclick="feedView(this,'cal')"></button>
    </div>
    <div id="feedBody"></div>
    <div id="feedCal" style="display:none"></div>
  </div>

  <!-- ПРОФИЛЬ (с вишлистом внутри) -->
  <div id="profile" class="screen">
    <div class="card" style="text-align:center">
      <div class="avatar" id="pfAv" style="margin:0 auto 12px"></div>
      <h2 style="font-size:20px" id="pfName"></h2>
      <p class="muted" id="pfSub"></p>
      <div class="row" style="margin-top:16px">
        <div class="stat"><b id="pfFriends">0</b><span data-i18n="p_friends"></span></div>
        <div class="stat"><b id="pfEvents">0</b><span data-i18n="p_events"></span></div>
        <div class="stat"><b id="pfWishes">0</b><span data-i18n="p_wishes"></span></div>
      </div>
      <button class="btn sec" style="margin-top:14px" onclick="open_('mAccount')" data-i18n="p_settings"></button>
    </div>

    <h3><span data-i18n="p_my_wishlist"></span> <span class="link" id="wishToggle" onclick="toggleWishMode()"></span></h3>
    <div id="wishItems"></div>
    <button class="btn ico" id="addWishBtn" onclick="openAdd()"></button>
    <div class="note" id="wishNote"></div>

    <h3 data-i18n="p_privacy"></h3>
    <div class="card">
      <label data-i18n="p_who_sees"></label>
      <select id="selWho"></select>
      <label data-i18n="p_bday_seen"></label>
      <select id="selBday"></select>
    </div>
  </div>

  <!-- СОБЫТИЕ -->
  <div id="event" class="screen">
    <div class="hero" style="background:linear-gradient(135deg,#14b8a6,#4f7cf0)">
      <h2 id="evTitle"></h2>
      <p id="evWhen"></p>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><b id="evCount">14</b> <span class="muted" data-i18n="e_count_come"></span></div>
        <div><span class="muted" data-i18n="e_left"></span> <b id="evDays"></b></div>
      </div>
    </div>
    <h3 data-i18n="e_organizers"></h3>
    <div class="card" id="orgs"></div>
    <h3 data-i18n="e_rsvp_q"></h3>
    <div class="card">
      <div class="seg" id="rsvpSeg" style="margin:0">
        <button onclick="rsvp(this,t('e_going'))" data-i18n="e_going"></button>
        <button onclick="rsvp(this,t('e_maybe'))" data-i18n="e_maybe"></button>
        <button onclick="rsvp(this,t('e_not_going'))" data-i18n="e_not_going"></button>
      </div>
      <button class="btn sec" style="margin-top:12px" onclick="toast(t('toast_cal'))" data-i18n="e_add_cal"></button>
    </div>
    <h3><span data-i18n="e_resources"></span></h3>
    <div id="resources"></div>
    <h3><span data-i18n="e_guests"></span> <span class="link" onclick="toast(t('toast_qr'))" data-i18n="e_qr"></span></h3>
    <div class="card" id="guests"></div>
    <h3><span data-i18n="e_bring"></span> <span class="link" onclick="toast(t('toast_signup'))" data-i18n="e_signup"></span></h3>
    <div class="card" id="checklist"></div>
    <h3><span data-i18n="e_album"></span> <span class="link" onclick="toast(t('toast_photo'))" data-i18n="e_add_photo"></span></h3>
    <div class="card" id="album"></div>
    <h3 data-i18n="e_discussion"></h3>
    <div class="card" id="wall"></div>
  </div>

  <!-- УВЕДОМЛЕНИЯ -->
  <div id="notif" class="screen">
    <h3 data-i18n="n_title"></h3>
    <div id="notifList"></div>
  </div>
</div>

<button class="fab" id="fab" onclick="openCreate()"></button>

<div class="tabbar"><div class="inner">
  <button class="tab on" data-s="feed" onclick="go('feed',this)"><span class="tic"></span><span data-i18n="tab_feed"></span></button>
  <button class="tab" data-s="profile" onclick="go('profile',this)"><span class="tic"></span><span data-i18n="tab_profile"></span></button>
  <button class="tab" data-s="notif" onclick="go('notif',this)"><span class="tic"></span><span data-i18n="tab_notif"></span></button>
</div></div>

<!-- АККАУНТ -->
<div class="modal" id="mAccount"><div class="sheet">
  <div class="grab"></div>
  <div class="row" style="margin-bottom:16px">
    <div class="avatar" id="acAv" style="width:50px;height:50px;font-size:20px"></div>
    <div><b id="acName"></b><div class="muted">business@sagibonus.com</div></div>
  </div>
  <label data-i18n="ac_lang"></label>
  <div class="langseg" id="acLang" style="justify-content:flex-start"></div>
  <div class="ev" onclick="toast(t('toast_edit'))"><span class="ic sm" id="acEdit"></span><div class="meta"><b data-i18n="ac_edit"></b></div></div>
  <div class="ev" onclick="toast(t('toast_priv'))"><span class="ic sm" id="acPriv"></span><div class="meta"><b data-i18n="ac_privacy"></b></div></div>
  <div class="ev" onclick="toast(t('toast_notif'))"><span class="ic sm" id="acNotif"></span><div class="meta"><b data-i18n="ac_notif"></b></div></div>
  <div class="ev" onclick="toast(t('toast_help'))"><span class="ic sm" id="acHelp"></span><div class="meta"><b data-i18n="ac_help"></b></div></div>
  <button class="btn danger" style="margin-top:8px" onclick="logout()" data-i18n="ac_logout"></button>
  <button class="btn sec" onclick="close_('mAccount')" data-i18n="ac_close"></button>
</div></div>

<!-- СОЗДАТЬ СОБЫТИЕ -->
<div class="modal" id="mCreate"><div class="sheet">
  <div class="grab"></div>
  <h3 data-i18n="c_title"></h3>
  <label data-i18n="c_type"></label>
  <div id="evTypes"></div>
  <label data-i18n="c_name"></label><input data-i18n-ph="c_name_ph">

  const cat = o.cat? typeLabel("birthday") : typeLabel(o.ty);
  return `<div class="ev" ${onclick?`onclick="${onclick}"`:''}>
    <div class="ic">${ic(typeIcon[o.ty]||"calendar")}</div>
    <div class="meta"><b>${o.t}</b><span>${o.s||cat}</span>${o.cat?`<span class="cat">${cat}</span>`:''}</div>
    <span class="pill ${o.soon?'soon':''}">${o.p}${t("e_days")==='d'?'d':''}</span></div>`;
}

function renderCalendar(){
  const today=21,days=30;
  const first=(new Date(2026,5,1).getDay()+6)%7;
  let cells="";
  for(let i=0;i<first;i++)cells+=`<div class="calday empty"></div>`;
  for(let d=1;d<=days;d++){
    const ev=calEvents[d];
    cells+=`<div class="calday${d==today?' today':''}${ev?' has':''}" ${ev?`onclick="go('event')"`:''}>${d}${ev?'<span class="mk"></span>':''}</div>`;
  }
  const list=Object.keys(calEvents).sort((a,b)=>a-b).map(d=>{
    const k=calEvents[d]=="cake"?"birthday":calEvents[d]=="briefcase"?"business_forum":"bachelorette";
    return `<div class="ev" onclick="go('event')"><div class="ic">${ic(calEvents[d])}</div><div class="meta"><b>${typeLabel(k)}</b><span>${d}.06.2026</span></div></div>`;
  }).join("");
  $("#feedCal").innerHTML=`<div class="calhead"><span onclick="toast(t('toast_prevm'))">‹</span><b>${t("cal_month")}</b><span onclick="toast(t('toast_nextm'))">›</span></div>
    <div class="calgrid">${t("weekdays").map(d=>`<div class="caldow">${d}</div>`).join("")}${cells}</div>
    <h3>${t("cal_activities")}</h3>${list}`;
}

// ---------- навигация / действия ----------
function go(s,el){$$(".screen").forEach(x=>x.classList.remove("active"));$("#"+s).classList.add("active");$$(".tab").forEach(tb=>tb.classList.toggle("on",tb.dataset.s===s));window.scrollTo(0,0)}
function feedView(el,v){el.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("on"));el.classList.add("on");$("#feedBody").style.display=v=='list'?'block':'none';$("#feedCal").style.display=v=='cal'?'block':'none'}
function toggleWishMode(){wishMode=wishMode=="mine"?"friend":"mine";$("#wishToggle").textContent=wishMode=="mine"?t("pw_friend_view"):t("pw_my_list");$("#addWishBtn").style.display=wishMode=="mine"?"flex":"none";renderWishes()}
function pickType(el){el.parentNode.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));el.classList.add("on")}
function setMode(isNew){user.isNew=isNew;$("#dmNew").classList.toggle("on",isNew);$("#dmActive").classList.toggle("on",!isNew)}
function startOnboarding(){setMode(true);feed=[];mine=[];wishes=[];notifs=[];user={name:"",city:"",av:"",isNew:true};wishMode="mine";applyI18n();renderAll();ostep(1);$("#onb").classList.add("show")}
function ostep(n){$$(".ostep").forEach(x=>x.classList.remove("active"));$("#o"+n).classList.add("active");$(".onb").scrollTop=0}
function saveProfile(){user.name=$("#obName").value||t("ob_name_ph");user.city=$("#obCity").value||"Алматы";user.av=(user.name.trim()[0]||"S").toUpperCase();renderAll();ostep(3)}
function finishOnboarding(){$("#onb").classList.remove("show");applyI18n();renderAll();go("feed");document.querySelector('.tab[data-s=feed]').classList.add('on');toast(t("toast_welcome"))}
function loadActive(){setMode(false);$("#onb").classList.remove("show");user={name:"Саги",city:"Алматы",av:"С",isNew:false};feed=[...D.feed];mine=[...D.mine];wishes=JSON.parse(JSON.stringify(D.wishes));notifs=[...D.notifs];applyI18n();renderAll();go("feed")}
function logout(){close_("mAccount");startOnboarding();toast(t("toast_logout"))}
function createEvent(){close_("mCreate");open_("mInvite")}
function rsvp(el,v){el.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("on"));el.classList.add("on");toast(v)}
function reserve(i){wishes[i].res=true;renderWishes();toast(t("toast_reserved"))}
function chipIn(i){wishes[i].collected=Math.min(100,wishes[i].collected+15);renderWishes();toast(t("toast_chipin"))}
function addWish(){const n=$("#addName").value||t("aw_name_ph");wishes.unshift({ty:"gift",t:n,pr:($("#addPrice").value||"—")+" ₸",prio:$("#addPrio").selectedIndex==0?"aw_prio1":$("#addPrio").selectedIndex==1?"aw_prio2":"aw_prio3",note:$("#addNote").value,res:false,joint:$("#addJoint").checked,collected:0});["addName","addPrice","addNote","addLink"].forEach(id=>$("#"+id).value="");$("#addJoint").checked=false;close_("mAdd");renderAll();toast(t("toast_added"))}
$$(".modal").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)m.classList.remove("show")}));

// старт
applyI18n();
startOnboarding();
</script>
</body>
</html>
