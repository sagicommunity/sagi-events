<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagi Events — лендинг</title>
<style>
  :root{
    --ink:#15233b; --ink2:#5a6b82; --bg:#f6f9fc; --card:#ffffff;
    --accent:#2f6bed; --accent2:#14b8a6; --line:#e6ecf3;
    --grad:linear-gradient(115deg,#2f6bed,#14b8a6); color-scheme:light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;overflow-x:hidden}
  .wrap{max-width:1100px;margin:0 auto;padding:0 22px}
  a{color:inherit;text-decoration:none}
  svg{display:block}
  .btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:14px 24px;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:.2s}
  .btn.pri{background:var(--grad);color:#fff;box-shadow:0 10px 26px rgba(47,107,237,.32)}
  .btn.pri:hover{transform:translateY(-2px)}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn.big{padding:17px 30px;font-size:16px}
  nav{position:sticky;top:0;z-index:50;background:rgba(246,249,252,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;gap:14px}
  .logo{font-weight:800;font-size:20px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  .navlinks{display:flex;gap:24px;align-items:center;font-size:14px;color:var(--ink2);margin-left:auto}
  .navlinks a:hover{color:var(--ink)}
  .navcta{display:flex;gap:10px;align-items:center}
  .lang{display:flex;gap:4px;background:#eef2f7;border-radius:20px;padding:3px}
  .lang button{border:none;background:transparent;color:var(--ink2);padding:5px 10px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer}
  .lang button.on{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .hero{position:relative;padding:64px 0 40px;overflow:hidden}
  .hero::before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:var(--grad);filter:blur(120px);opacity:.16;top:-200px;right:-150px}
  .hero .wrap{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;position:relative}
  .badge{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:30px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--accent);margin-bottom:18px}
  h1{font-size:46px;line-height:1.08;letter-spacing:-1px;margin-bottom:18px}
  h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{font-size:18px;color:var(--ink2);margin-bottom:26px;max-width:520px}
  .herobtns{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .reassure{font-size:13px;color:var(--ink2);margin-top:14px}
  .reassure b{color:var(--ink)}
  .phone{justify-self:center;width:280px;height:560px;background:#131c2b;border-radius:38px;padding:12px;box-shadow:0 30px 70px rgba(20,40,80,.28);border:1px solid #26324a}
  .scr{width:100%;height:100%;border-radius:28px;overflow:hidden;background:radial-gradient(400px 200px at 80% 0,#16243f 0,transparent 60%),#0f1420;color:#eef2f8;padding:18px 14px;font-size:12px}
  .scr .h{font-weight:800;font-size:16px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:14px}
  .scr .hero2{background:var(--grad);border-radius:16px;padding:14px;margin-bottom:12px}
  .scr .hero2 b{font-size:14px}.scr .hero2 span{font-size:11px;opacity:.92}
  .scr .item{display:flex;gap:9px;align-items:center;background:#18212f;border-radius:11px;padding:9px;margin-bottom:8px}
  .scr .em{width:32px;height:32px;border-radius:9px;background:#243149;display:flex;align-items:center;justify-content:center;color:#6da3ff;flex-shrink:0}
  .scr .item b{font-size:11.5px}.scr .item small{color:#94a0b4;font-size:10px;display:block}
  .scr .pill{margin-left:auto;font-size:9px;background:#3a3a20;color:#ecd58a;padding:3px 7px;border-radius:10px;white-space:nowrap}
  section{padding:58px 0}
  .eyebrow{text-align:center;color:var(--accent);font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
  h2{text-align:center;font-size:34px;letter-spacing:-.5px;margin-bottom:14px}
  .sub{text-align:center;color:var(--ink2);font-size:17px;max-width:620px;margin:0 auto 44px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .feat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;transition:.2s}
  .feat:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(20,40,80,.08)}
  .feat .ficon{width:50px;height:50px;border-radius:14px;background:#e9f1fd;display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:14px}
  .feat h3{font-size:18px;margin-bottom:8px}
  .feat p{color:var(--ink2);font-size:14.5px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch}
  .panel{border-radius:20px;padding:26px}
  .panel.bad{background:#fff4f4;border:1px solid #ffe2e2}
  .panel.good{background:#eef4ff;border:1px solid #dbe7ff}
  .panel h3{font-size:18px;margin-bottom:14px}
  .panel li{list-style:none;font-size:14.5px;color:var(--ink2);padding:7px 0 7px 28px;position:relative}
  .panel.bad li::before{content:"✕";position:absolute;left:0;color:#e5484d;font-weight:700}
  .panel.good li::before{content:"✓";position:absolute;left:0;color:var(--accent);font-weight:700}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .step{text-align:center;padding:14px}
  .step .n{width:46px;height:46px;border-radius:50%;background:var(--grad);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:18px}
  .step h3{font-size:17px;margin-bottom:6px}
  .step p{color:var(--ink2);font-size:14px}
  .band{background:var(--ink);color:#fff;border-radius:26px;padding:46px;text-align:center;position:relative;overflow:hidden}
  .band::before{content:"";position:absolute;width:400px;height:400px;border-radius:50%;background:var(--grad);filter:blur(110px);opacity:.4;top:-150px;left:-100px}
  .band h2{color:#fff;position:relative}
  .band p{color:#aebccf;max-width:560px;margin:10px auto 0;position:relative;font-size:16px}
  .stats{display:flex;justify-content:center;gap:50px;margin-top:32px;position:relative;flex-wrap:wrap}
  .stat b{font-size:34px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;display:block}
  .stat span{font-size:13px;color:#aebccf}
  .final{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:26px;padding:54px 26px;box-shadow:0 20px 50px rgba(20,40,80,.07)}
  .final h2{margin-bottom:12px}
  .final p{color:var(--ink2);font-size:17px;margin-bottom:26px}
  footer{padding:40px 0 60px;text-align:center;color:var(--ink2);font-size:13px}
  .screens{display:flex;gap:18px;overflow-x:auto;padding:6px 4px 18px;scroll-snap-type:x mandatory}
  .gcol{flex:0 0 auto;scroll-snap-align:center;text-align:center}
  .gcol .cap{font-size:13px;color:var(--ink2);margin-top:12px;font-weight:600}
  .gphone{width:230px;height:460px;background:#131c2b;border-radius:30px;padding:9px;box-shadow:0 18px 44px rgba(20,40,80,.2);border:1px solid #26324a}
  .gscr{width:100%;height:100%;border-radius:23px;overflow:hidden;background:radial-gradient(300px 160px at 80% 0,#16243f 0,transparent 60%),#0f1420;color:#eef2f8;padding:14px 11px;font-size:11px;text-align:left}
  .gscr .gh{font-weight:800;font-size:13px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .gscr .gban{border-radius:13px;padding:11px;margin-bottom:9px;color:#fff}
  .gscr .git{display:flex;gap:7px;align-items:center;background:#18212f;border-radius:9px;padding:7px;margin-bottom:6px}
  .gscr .gem{width:26px;height:26px;border-radius:7px;background:#243149;display:flex;align-items:center;justify-content:center;color:#6da3ff;flex-shrink:0}
  .gscr .git b{font-size:10.5px}.gscr .git small{color:#94a0b4;font-size:9px;display:block}
  .gscr .grole{margin-left:auto;font-size:8px;background:#23314a;color:#9fc0ff;padding:2px 6px;border-radius:7px}
  .gcal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
  .gcal div{aspect-ratio:1;border-radius:5px;background:#18212f;display:flex;align-items:center;justify-content:center;font-size:8px;color:#94a0b4;position:relative}
  .gcal div.m{background:#23314a;color:#fff}
  .gcal div.m::after{content:"";position:absolute;bottom:2px;width:3px;height:3px;border-radius:50%;background:#14b8a6}
  .gbar{height:6px;border-radius:4px;background:#243149;margin-top:5px;overflow:hidden}.gbar i{display:block;height:100%;background:var(--grad)}
  @media(max-width:820px){
    .hero .wrap,.split{grid-template-columns:1fr}
    .grid,.steps{grid-template-columns:1fr}
    h1{font-size:34px}h2{font-size:27px}
    .phone{order:-1;width:240px;height:480px}
    .navlinks{display:none}
  }
</style>
</head>
<body>

<nav><div class="wrap">
  <div class="logo">Sagi Events</div>
  <div class="navlinks">
    <a href="#feat" data-i18n="nav_features"></a>
    <a href="#screens" data-i18n="nav_screens"></a>
    <a href="#how" data-i18n="nav_how"></a>
  </div>
  <div class="navcta">
    <div class="lang" id="lang"></div>
    <a class="btn ghost" href="app.html" data-i18n="nav_login"></a>
    <a class="btn pri" href="app.html" data-i18n="nav_create"></a>
  </div>
</div></nav>

<header class="hero"><div class="wrap">
  <div>
    <span class="badge" data-i18n="hero_badge"></span>
    <h1><span data-i18n="hero_h1a"></span> <span class="g" data-i18n="hero_h1b"></span></h1>
    <p class="lead" data-i18n="hero_lead"></p>
    <div class="herobtns">
      <a class="btn pri big" href="app.html" data-i18n="hero_cta1"></a>
      <a class="btn ghost big" href="app.html" data-i18n="hero_cta2"></a>
    </div>
    <p class="reassure" data-i18n="hero_reassure"></p>
  </div>
  <div class="phone"><div class="scr">
    <div class="h">Sagi Events</div>
    <div class="hero2"><b id="ph_hi"></b><br><span id="ph_week"></span></div>
    <div class="item"><div class="em" id="phi1"></div><div><b>Айдар Сапаров</b><small id="ph_bday"></small></div><span class="pill">+3</span></div>

  </div></div>
</div></header>

<section><div class="wrap">
  <div class="eyebrow" data-i18n="prob_eyebrow"></div>

  <p class="sub" data-i18n="prob_sub"></p>

    <div class="panel bad"><h3 data-i18n="prob_bad_h"></h3>
      <li data-i18n="bad1"></li><li data-i18n="bad2"></li><li data-i18n="bad3"></li><li data-i18n="bad4"></li><li data-i18n="bad5"></li>
    </div>
    <div class="panel good"><h3 data-i18n="prob_good_h"></h3>
      <li data-i18n="good1"></li><li data-i18n="good2"></li><li data-i18n="good3"></li><li data-i18n="good4"></li><li data-i18n="good5"></li>
    </div>
  </div>
</div></section>

<section id="feat"><div class="wrap">
  <div class="eyebrow" data-i18n="feat_eyebrow"></div>
  <h2 data-i18n="feat_h2"></h2>
  <p class="sub" data-i18n="feat_sub"></p>
  <div class="grid">
    <div class="feat"><div class="ficon" id="fi1"></div><h3 data-i18n="f1t"></h3><p data-i18n="f1d"></p></div>
    <div class="feat"><div class="ficon" id="fi2"></div><h3 data-i18n="f2t"></h3><p data-i18n="f2d"></p></div>
    <div class="feat"><div class="ficon" id="fi3"></div><h3 data-i18n="f3t"></h3><p data-i18n="f3d"></p></div>
    <div class="feat"><div class="ficon" id="fi4"></div><h3 data-i18n="f4t"></h3><p data-i18n="f4d"></p></div>
    <div class="feat"><div class="ficon" id="fi5"></div><h3 data-i18n="f5t"></h3><p data-i18n="f5d"></p></div>
    <div class="feat"><div class="ficon" id="fi6"></div><h3 data-i18n="f6t"></h3><p data-i18n="f6d"></p></div>
  </div>
</div></section>

<section id="screens"><div class="wrap">
  <div class="eyebrow" data-i18n="scr_eyebrow"></div>
  <h2 data-i18n="scr_h2"></h2>
  <p class="sub" data-i18n="scr_sub"></p>
  <div class="screens">
    <div class="gcol"><div class="gphone"><div class="gscr">
      <div class="gh"><span id="si_cal"></span><span data-i18n="cal_month"></span></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:8px;color:#94a0b4;margin-bottom:3px" id="si_dow"></div>
      <div class="gcal" id="gcalGrid"></div>
      <div style="font-size:9px;color:#94a0b4;margin-top:8px" data-i18n="cal_legend"></div>
    </div></div><div class="cap" data-i18n="cap_cal"></div></div>

    <div class="gcol"><div class="gphone"><div class="gscr">
      <div class="gh"><span id="si_user"></span><span data-i18n="cap_profile"></span></div>
      <div style="text-align:center;margin-bottom:10px">
        <div style="width:46px;height:46px;border-radius:50%;background:var(--grad);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">С</div>
        <b style="font-size:12px">Саги</b></div>
      <div style="display:flex;gap:6px;text-align:center;margin-bottom:10px">
        <div style="flex:1"><b style="font-size:13px">48</b><br><small style="color:#94a0b4;font-size:8px" data-i18n="p_friends"></small></div>

        <div style="flex:1"><b style="font-size:13px">12</b><br><small style="color:#94a0b4;font-size:8px" data-i18n="p_wishes"></small></div></div>
      <div class="git"><div class="gem" id="si_gift1"></div><div><b data-i18n="p_my_wishlist"></b><small data-i18n="scr_wish_n"></small></div></div>
      <div class="git"><div class="gem" id="si_lock"></div><div><b data-i18n="p_privacy"></b></div></div>
    </div></div><div class="cap" data-i18n="cap_profile"></div></div>

    <div class="gcol"><div class="gphone"><div class="gscr">
      <div class="gban" style="background:var(--grad)"><b data-i18n="p_my_wishlist"></b></div>
      <div class="git"><div class="gem" id="si_gift2"></div><div><b data-i18n="scr_w1"></b><small>89 000 ₸</small></div></div>
      <div class="git"><div class="gem" id="si_gift3"></div><div style="flex:1"><b data-i18n="scr_w2"></b><small data-i18n="scr_joint"></small><div class="gbar"><i style="width:60%"></i></div></div></div>
      <div class="git" style="opacity:.5"><div class="gem" id="si_gift4"></div><div><b data-i18n="scr_w3"></b><small data-i18n="scr_taken"></small></div></div>
    </div></div><div class="cap" data-i18n="cap_wish"></div></div>

    <div class="gcol"><div class="gphone"><div class="gscr">
      <div class="gban" style="background:linear-gradient(135deg,#14b8a6,#2f6bed)"><b data-i18n="scr_ev_t"></b><br><small data-i18n="scr_ev_s"></small></div>
      <div class="git"><div class="gem" id="si_u1"></div><div><b data-i18n="scr_org"></b></div><span class="grole" data-i18n="e_organizer"></span></div>
      <div class="git"><div class="gem" id="si_u2"></div><div><b data-i18n="scr_coorg"></b></div><span class="grole" data-i18n="e_coorg"></span></div>
      <div style="font-size:9px;color:#94a0b4;margin:6px 0 5px" data-i18n="e_resources"></div>
      <div class="git"><div class="gem" id="si_pin"></div><div><b data-i18n="scr_map"></b></div></div>
      <div class="git"><div class="gem" id="si_folder"></div><div><b>Google Drive</b></div></div>
    </div></div><div class="cap" data-i18n="cap_event"></div></div>
  </div>
</div></section>

<section id="how"><div class="wrap">

    <a class="btn ghost big" style="margin-left:10px" href="app.html" data-i18n="final_cta2"></a>

function tl(k){return (L[lang]&&L[lang][k]!=null)?L[lang][k]:L.ru[k]}
function applyL(){
  document.documentElement.lang=lang;
  $$("[data-i18n]").forEach(e=>e.textContent=tl(e.getAttribute("data-i18n")));
  $("#lang").innerHTML=Object.keys(LANGS).map(k=>`<button class="${k==lang?'on':''}" onclick="setLang('${k}')">${LANGS[k]}</button>`).join("");
  // иконки
  const set=(id,n,c)=>{const e=$("#"+id);if(e){e.innerHTML=ic(n,c||24)}};
  set("fi1","cake");set("fi2","gift");set("fi3","coins");set("fi4","link");set("fi5","mail");set("fi6","camera");
  set("phi1","cake",18);set("phi2","briefcase",18);set("phi3","gift",18);

  set("si_gift1","gift",15);set("si_lock","lock",15);
  set("si_gift2","watch",15);set("si_gift3","watch",15);set("si_gift4","book",15);
  set("si_u1","user",15);set("si_u2","user",15);set("si_pin","pin",15);set("si_folder","folder",15);
  // мини-календарь
  const marks={24:1,25:1,27:1};$("#gcalGrid").innerHTML=Array.from({length:30},(_,i)=>`<div class="${marks[i+1]?'m':''}">${i+1}</div>`).join("");
  $("#si_dow").innerHTML=(lang=="en"?["Mo","Tu","We","Th","Fr","Sa","Su"]:lang=="kz"?["Дс","Сс","Ср","Бс","Жм","Сб","Жс"]:["Пн","Вт","Ср","Чт","Пт","Сб","Вс"]).map(d=>`<div>${d}</div>`).join("");
  // phone mockup тексты
  $("#ph_hi").textContent=tl("ph_hi");$("#ph_week").textContent=tl("ph_week");$("#ph_bday").textContent=tl("ph_bday");$("#ph_joint").textContent=tl("ph_joint");
}
function setLang(l){lang=l;applyL()}
$$('a[href^="#"]').forEach(a=>a.addEventListener("click",e=>{e.preventDefault();document.querySelector(a.getAttribute("href")).scrollIntoView({behavior:"smooth"})}));
